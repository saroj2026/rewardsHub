# Explicit project name — do NOT remove. Compose defaults the project name to
# the directory's basename ("backend"), which collides with unrelated
# pre-existing Docker projects on shared dev machines. Pinning it here keeps
# this stack's containers/volumes/network fully isolated under
# "rewardshub-backend_*" regardless of folder name or working directory.
name: rewardshub-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rewardshub
      POSTGRES_PASSWORD: rewardshub_dev
      POSTGRES_DB: rewardshub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewardshub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rewardshub
      MINIO_ROOT_PASSWORD: rewardshub_dev_secret
    ports:
      - "9010:9000" # S3 API (host 9010 — 9000 is already bound by another process on this machine)
      - "9011:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
