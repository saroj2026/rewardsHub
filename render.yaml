databases:
  - name: rewardshub-db
    plan: free
    databaseName: rewardshub
    user: rewardshub

services:
  - type: web
    name: rewardshub-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rewardshub-db
          property: connectionString
      - key: NODE_VERSION
        value: 22.14.0
      - key: JWT_ACCESS_TTL_SECONDS
        value: "900"
      - key: JWT_REFRESH_TTL_SECONDS
        value: "2592000"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
